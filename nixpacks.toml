[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = [
  "npm install",
]

[phases.build]
cmds = ["node node_modules/yt-dlp-exec/scripts/postinstall.js || node -e \"require('yt-dlp-exec').download()\"; node -e \"const fs = require('fs'); const p = 'node_modules/yt-dlp-exec/bin/yt-dlp'; if (fs.existsSync(p)) fs.chmodSync(p, 0o755)\""]

[phases.postinstall]
cmds = ["npm run build"]

[start]
cmd = "npm start"
